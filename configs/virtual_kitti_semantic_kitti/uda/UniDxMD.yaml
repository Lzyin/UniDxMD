MODEL_2D:
  TYPE: "UNetResNet34"
  NUM_CLASSES: 6
  DUAL_HEAD: True
  CODEBOOK_NUM: 128
  CODEBOOK_DIM: 128
MODEL_3D:
  TYPE: "SCN"
  NUM_CLASSES: 6
  DUAL_HEAD: True
  SCN:
    in_channels: 1   
DATASET_SOURCE:
  TYPE: "VirtualKITTISCN"
  TRAIN: ("train",)
  VirtualKITTISCN:
    preprocess_dir: "/datasets_local/datasets_mjaritz/virtual_kitti_preprocess/preprocess"
    virtual_kitti_dir: "/datasets_local/datasets_mjaritz/virtual_kitti_preprocess"
    use_color: False  # Set use_rgb for source
DATASET_TARGET:
  TYPE: "SemanticKITTISCN"
  TRAIN: ("train",)
  VAL: ("val",)
  TEST: ("test",)
  SemanticKITTISCN:
    preprocess_dir: "/datasets_local/datasets_mjaritz/semantic_kitti_preprocess/preprocess"
    semantic_kitti_dir: "/datasets_local/datasets_mjaritz/semantic_kitti_preprocess"
    merge_classes_style: "VirtualKITTI"
    use_color: False  
DATALOADER:
  NUM_WORKERS: 4
OPTIMIZER:
  TYPE: "Adam"
  BASE_LR: 0.001
SCHEDULER:
  TYPE: "MultiStepLR"
  MultiStepLR:
    gamma: 0.1
    milestones: (48000, 56000)
  MAX_ITERATION: 100000
TRAIN:
  BATCH_SIZE: 8
  SUMMARY_PERIOD: 50
  CHECKPOINT_PERIOD: 4000
  CLASS_WEIGHTS: [1., 2.03402089, 1.20641905, 2.21588055, 2.59745666, 1.82057006]
  XMUDA:
    lambda_xm_src: 0.1
    lambda_xm_trg: 0.02
    lambda_pl_2d: 0.5
VAL:
  BATCH_SIZE: 8
  PERIOD: 4000
OUTPUT_DIR: "UniDxMD/results/@" #  @ will be replaced with config path, e.g. nuscenes/usa_singapore/UniDxMD

